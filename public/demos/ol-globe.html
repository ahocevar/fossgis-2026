<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://esm.sh/ol/ol.css">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0a1628;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script type="module">
    import proj4 from 'https://esm.sh/proj4';
    import {register} from 'https://esm.sh/ol/proj/proj4.js';
    import {fromLonLat, get as getProjection} from 'https://esm.sh/ol/proj.js';
    import Map from 'https://esm.sh/ol/Map.js';
    import View from 'https://esm.sh/ol/View.js';
    import GeoJSON from 'https://esm.sh/ol/format/GeoJSON.js';
    import VectorLayer from 'https://esm.sh/ol/layer/Vector.js';
    import VectorSource from 'https://esm.sh/ol/source/Vector.js';
    import Feature from 'https://esm.sh/ol/Feature.js';
    import PolygonGeom from 'https://esm.sh/ol/geom/Polygon.js';

    // Verbatim from OL equal-earth-geojson example
    function dynEqualEarth(center, round = 15) {
      const lon0 = Math.round(center[0] / round) * round;
      const code = `EqualEarth${lon0}`;
      let prj = getProjection(code);
      if (!prj) {
        proj4.defs(
          code,
          `+proj=eqearth +lon_0=${lon0} +x_0=0 +y_0=0 +R=6371008.7714 +units=m +no_defs +type=crs`,
        );
        register(proj4);
        prj = getProjection(code);
        prj.setGlobal(true);
        prj.setExtent([-17243959.06, -8392927.6, 17243959.06, 8392927.6]);
        prj.setWorldExtent([-180, -90, 180, 90]);
      }
      return prj;
    }

    // Verbatim from OL equal-earth-geojson example
    function clipPolygon(geojson, lon0) {
      function roundN(num, n = 10) {
        return Math.round(num * Math.pow(10, n)) / Math.pow(10, n);
      }
      const minX = lon0 - 180.0;
      const maxX = lon0 + 180.0;
      const clippedJson = {type: 'FeatureCollection', features: []};
      for (const feature of geojson.features) {
        const depth = feature.geometry.type === 'MultiPolygon' ? 2 : 1;
        const [featMinX, featMaxX] = feature.geometry.coordinates
          .flat(depth)
          .reduce(
            (minmax, coord) => [
              Math.min(minmax[0], coord[0]),
              Math.max(minmax[1], coord[0]),
            ],
            [Number.MAX_VALUE, Number.MIN_VALUE],
          );
        const eps = 0.01;
        if (
          (featMinX < minX + eps && featMaxX > minX - eps) ||
          (featMinX < maxX + eps && featMaxX > maxX - eps)
        ) {
          const offset = featMinX < minX ? 360 : -360;
          const feat = structuredClone(feature);
          if (feat.geometry.type === 'Polygon') {
            feat.geometry.type = 'MultiPolygon';
            feat.geometry.coordinates = [feat.geometry.coordinates];
          }

          const polys = [];
          for (const polygon of feat.geometry.coordinates) {
            const tpoly = structuredClone(polygon);
            const ncoords = polygon.reduce((sum, ring) => sum + ring.length, 0);
            let clamped = 0;
            for (const ring of polygon) {
              for (const coord of ring) {
                const x = coord[0];
                coord[0] = roundN(Math.min(Math.max(x, minX), maxX));
                if (coord[0] !== roundN(x)) {
                  clamped++;
                }
              }
            }
            // Skip possibly degenerated polys with all coords clamped
            if (clamped < ncoords) {
              polys.push(polygon);
            }
            // Shift poly by 360° and clamp other part
            if (clamped) {
              let around180 = false;
              for (const ring of tpoly) {
                for (const coord of ring) {
                  const x = coord[0] + offset;
                  coord[0] = Math.min(Math.max(x, minX + eps), maxX - eps);
                  // this still creates bad polys when coords are around 180°
                  if (Math.abs(coord[0]) - 180 < 0.00000001) {
                    around180 = true;
                  }
                }
              }
              if (!around180) {
                polys.push(tpoly);
              }
            }
          }
          feat.geometry.coordinates = polys;
          clippedJson.features.push(feat);
        } else if (featMaxX < minX) {
          // Feature entirely left of range — shift right by 360°
          const feat = structuredClone(feature);
          for (const coord of feat.geometry.coordinates.flat(depth)) {
            coord[0] += 360;
          }
          clippedJson.features.push(feat);
        } else if (featMinX > maxX) {
          // Feature entirely right of range — shift left by 360°
          const feat = structuredClone(feature);
          for (const coord of feat.geometry.coordinates.flat(depth)) {
            coord[0] -= 360;
          }
          clippedJson.features.push(feat);
        } else {
          clippedJson.features.push(feature);
        }
      }
      return clippedJson;
    }

    // Verbatim from OL equal-earth-geojson example
    function jsonSource(geojson, projection) {
      return new VectorSource({
        features: new GeoJSON({
          featureProjection: projection,
        }).readFeatures(geojson),
      });
    }

    const initialProjection = dynEqualEarth([0, 0], 1);
    const response = await fetch('./ne_110m_land.geojson');
    const geojson = await response.json();

    // Nudge coords away from exactly ±180 so clipPolygon's around180 check
    // doesn't incorrectly drop shifted polygon copies
    for (const feature of geojson.features) {
      for (const coord of feature.geometry.coordinates.flat(1)) {
        coord[0] = Math.min(Math.max(coord[0], -179.999), 179.999);
      }
    }

    const vectorLayer = new VectorLayer({
      source: jsonSource(clipPolygon(geojson, 0), initialProjection),
      extent: initialProjection.getExtent(),
      wrapX: false,
      style: {
        'fill-color': '#4a7c59',
        'stroke-color': '#2d5a3d',
        'stroke-width': 0.5,
      },
    });

    // Ocean oval — rendered before land features
    const ovalRing = [];
    for (let lat = -90; lat <= 90; lat += 1) {
      ovalRing.push(fromLonLat([-179.99, lat], initialProjection));
    }
    for (let lat = 90; lat >= -90; lat -= 1) {
      ovalRing.push(fromLonLat([179.99, lat], initialProjection));
    }
    ovalRing.push(ovalRing[0]);
    const oceanFeature = new Feature(new PolygonGeom([ovalRing]));
    const oceanLayer = new VectorLayer({
      source: new VectorSource({features: [oceanFeature]}),
      style: {'fill-color': '#1a6fa8'},
    });

    const map = new Map({
      layers: [oceanLayer, vectorLayer],
      target: 'map',
      view: new View({
        projection: initialProjection,
        center: [0, 0],
        zoom: 0,
        showFullExtent: true,
      }),
      controls: [],
    });

    // Auto-spin
    let lon = 0;
    setInterval(() => {
      lon += 2;
      if (lon > 180) lon -= 360;
      const newProjection = dynEqualEarth([lon, 0], 1);
      const lon0 = Math.round(lon);
      const clippedJson = clipPolygon(geojson, lon0);
      vectorLayer.setSource(jsonSource(clippedJson, newProjection));
      map.setView(new View({
        projection: newProjection,
        center: [0, 0],
        zoom: 0,
        showFullExtent: true,
      }));
    }, 50);
  </script>
</body>
</html>
