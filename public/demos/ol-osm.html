<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://esm.sh/ol/ol.css">
  <style>
    body { margin: 0; font-family: sans-serif; }
    #map { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script type="module">
    import Map from 'https://esm.sh/ol/Map.js';
    import TileLayer from 'https://esm.sh/ol/layer/Tile.js';
    import OSM from 'https://esm.sh/ol/source/OSM.js';
    import View from 'https://esm.sh/ol/View.js';
    import {fromLonLat} from 'https://esm.sh/ol/proj.js';

    const map = new Map({
      target: 'map',
      layers: [
        new TileLayer({
          source: new OSM(),
        }),
      ],
      view: new View({
        center: fromLonLat([9.93581, 51.54092]),
        zoom: 12,
      }),
    });
  </script>
</body>
</html>
