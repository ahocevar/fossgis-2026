<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://esm.sh/ol/ol.css">
  <style>
    body { margin: 0; font-family: sans-serif; }
    #map { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script type="module">
    import proj4 from 'https://esm.sh/proj4';
    import {register} from 'https://esm.sh/ol/proj/proj4.js';
    import Map from 'https://esm.sh/ol/Map.js';
    import TileLayer from 'https://esm.sh/ol/layer/Tile.js';
    import OSM from 'https://esm.sh/ol/source/OSM.js';
    import View from 'https://esm.sh/ol/View.js';

    proj4.defs('EPSG:25832', '+proj=utm +zone=32 +ellps=GRS80 +units=m +no_defs');
    register(proj4);

    const map = new Map({
      target: 'map',
      layers: [
        new TileLayer({
          source: new OSM(),
        }),
      ],
      view: new View({
        projection: 'EPSG:25832',
        center: [564898, 5710395],
        zoom: 17,
      }),
    });
  </script>
</body>
</html>
